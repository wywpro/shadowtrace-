[project]
name = "shadowtrace-backend"
version = "0.1.0"
description = "ShadowTrace FastAPI backend"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.32.0",
  "sqlalchemy[asyncio]>=2.0.36",
  "asyncpg>=0.30.0",
  "redis>=5.2.0",
  "orjson>=3.10.0",
  "jsonschema>=4.26.0",
  "pydantic>=2.10.0",
  "pydantic-settings>=2.6.0",
  "alembic>=1.14.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "pytest-asyncio>=0.24.0",
  "pytest-cov>=6.0.0",
  "httpx>=0.28.0",
  "ruff>=0.8.0",
  "mypy>=1.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
markers = [
  "integration: requires real PostgreSQL and Redis services",
]

[tool.coverage.run]
source = ["app"]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.ruff]
line-length = 100
target-version = "py311"
# Alembic writes verbose autogenerated revisions; keep them out of lint.
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

# FastAPI `Depends(...)` defaults are idiomatic; B008 is noisy inside route factories.
[tool.ruff.lint.per-file-ignores]
"app/mock_xdr/api.py" = ["B008"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
packages = ["app"]
